function addTask(defaultStatus){ editingTaskIdx = null; tempTaskWho = []; document.getElementById('taskModalTitle').textContent = 'Nova Task'; document.getElementById('taskDesc').value = ''; document.getElementById('taskDate').value = new Date().toISOString().slice(0, 10); document.getElementById('taskStatus').value = defaultStatus || STATUS_COLS[0].id; document.getElementById('taskSubtasks').value = ''; renderTaskWhoPills(); renderPickerGrid('taskPickerGrid', tempTaskWho); document.getElementById('taskOverlay').classList.add('open'); setTimeout(function(){ document.getElementById('taskDesc').focus(); }, 50); }
function editTask(idx){ editingTaskIdx = idx; const p = db.projects.find(function(p){ return p.id === currentProjectId; }); const t = p.tasks[idx]; tempTaskWho = Array.isArray(t.who) ? t.who.slice() : (t.who ? [t.who] : []); document.getElementById('taskModalTitle').textContent = 'Editar Task'; document.getElementById('taskDesc').value = t.desc; document.getElementById('taskDate').value = t.date || ''; document.getElementById('taskStatus').value = t.status || STATUS_COLS[0].id; document.getElementById('taskSubtasks').value = (t.subtasks || []).map(function(s){ return s.text; }).join('\n'); renderTaskWhoPills(); renderPickerGrid('taskPickerGrid', tempTaskWho); document.getElementById('taskOverlay').classList.add('open'); }
function saveTask(){
  const desc = document.getElementById('taskDesc').value.trim(); if(!desc){ toast('Digite a descrição'); return; }
  const p = db.projects.find(function(p){ return p.id === currentProjectId; });
  const subtasks = document.getElementById('taskSubtasks').value.trim().split('\n').filter(function(l){ return l.trim(); }).map(function(text, i){
    const prevDone = editingTaskIdx !== null && (p.tasks[editingTaskIdx].subtasks || [])[i] ? (p.tasks[editingTaskIdx].subtasks[i].done || false) : false;
    return { id: uid(), text: text.trim(), done: prevDone };
  });
  const task = { id: uid(), desc: desc, who: tempTaskWho.slice(), date: document.getElementById('taskDate').value, status: document.getElementById('taskStatus').value, subtasks: subtasks };
  if(!p.tasks) p.tasks = [];
  if(editingTaskIdx !== null) p.tasks[editingTaskIdx] = task; else p.tasks.push(task);

}
function removeTask(idx){ const p = db.projects.find(function(p){ return p.id === currentProjectId; }); p.tasks.splice(idx, 1); saveData(db); renderTasks(p); }
function toggleSubtask(ti, si){ const p = db.projects.find(function(p){ return p.id === currentProjectId; }); p.tasks[ti].subtasks[si].done = !p.tasks[ti].subtasks[si].done; saveData(db); renderTasks(p); }

function exportData(){ const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'planner-' + new Date().toISOString().slice(0, 10) + '.json'; a.click(); toast('Exportado'); }
function importData(e){ const file = e.target.files[0]; if(!file) return; const r = new FileReader(); r.onload = function(ev){ try{ const d = JSON.parse(ev.target.result); if(!d.projects) throw 0; db = d; saveData(db); renderCurrentView(); toast('Importado', 'success'); }catch(err){ toast('Erro ao importar'); } }; r.readAsText(file); e.target.value = ''; }

// ══ SUMMARY VIEW ══
let summaryMode = 'projects';
function setSummaryMode(mode){
  summaryMode = mode;
  document.getElementById('summaryModeProjects').classList.toggle('active', mode === 'projects');
  document.getElementById('summaryModePeople').classList.toggle('active', mode === 'people');
  document.getElementById('summaryProjectsMode').style.display = mode === 'projects' ? 'block' : 'none';
  document.getElementById('summaryPeopleMode').style.display = mode === 'people' ? 'block' : 'none';
  renderSummaryView();
}
function renderSummaryView(){
  if(summaryMode === 'people'){ renderSummaryByPerson(); return; }
  renderSummaryProjectsView();
}
function renderSummaryProjectsView(){
  const content = document.getElementById('summaryContent');
  const lastColId = STATUS_COLS.length ? STATUS_COLS[STATUS_COLS.length - 1].id : null;
  const projects = getFilteredProjects().filter(function(p){ return p.status !== lastColId; });
  const now = new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });

  const sortSel = document.getElementById('summarySort');
  const sortVal = sortSel ? sortSel.value : 'status';
  const sorted = projects.slice().sort(function(a, b){
    if(sortVal === 'name') return a.name.localeCompare(b.name, 'pt-BR');
    if(sortVal === 'status'){ const si = function(id){ return STATUS_COLS.findIndex(function(c){ return c.id === id; }); }; return si(a.status) - si(b.status); }
    if(sortVal === 'team') return ((a.team || [])[0] || '').localeCompare((b.team || [])[0] || '');
    if(sortVal === 'log'){ const ld = function(p){ return p.log && p.log.length > 0 ? p.log[p.log.length - 1].date : ''; }; return ld(b).localeCompare(ld(a)); }
    return 0;
  });

  content.innerHTML = '<div class="summary-toolbar"><div class="summary-toolbar-left"><div class="summary-toolbar-title">Planning · ' + now + ' · ' + projects.length + ' projetos ativos</div></div>'
    + '<div class="summary-toolbar-actions"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;font-weight:500;color:var(--color-gray)">Ordenar</span>'
    + '<select id="summarySort" class="summary-sort-sel" onchange="renderSummaryView()">'
    + '<option value="status"' + (sortVal === 'status' ? ' selected' : '') + '>Grupo Kanban</option>'
    + '<option value="name"' + (sortVal === 'name' ? ' selected' : '') + '>Nome A–Z</option>'
    + '<option value="team"' + (sortVal === 'team' ? ' selected' : '') + '>Time</option>'
    + '<option value="log"' + (sortVal === 'log' ? ' selected' : '') + '>Último registro</option></select></div>'
    + '<button class="btn btn-sm btn-secondary" onclick="exportMarkdown()">↓ .md</button>'
    + '<button class="btn btn-sm btn-secondary" onclick="printSummary()">↓ PDF</button></div></div>'
    + '<div class="summary-grid">' + sorted.map(function(p){ return renderSummaryCard(p); }).join('') + '</div>';
}

function renderSummaryCard(p){
  const lastLog = p.log && p.log.length > 0 ? p.log[p.log.length - 1] : null;
  const openTasks = (p.tasks || []).filter(function(t){ return t.status !== TASK_DONE_ID; });
  const hex = statusColorHex(p.status);
  const statusLabel = (STATUS_COLS.find(function(c){ return c.id === p.status; }) || {}).label || p.status;
  const teamAvatars = (p.team || []).slice(0, 5).map(function(t){ return '<div class="avatar" style="width:18px;height:18px;font-size:7px;' + avatarStyle(t) + '">' + t.slice(0, 2) + '</div>'; }).join('');

  const logBlock = lastLog ? '<div class="summary-log"><div class="summary-log-meta">' + escHtml(lastLog.author || 'Equipe') + ' · ' + formatDate(lastLog.date) + '</div>' + escHtml(lastLog.text) + '</div>' : '';

  const tasksBlock = openTasks.length > 0
    ? '<div><div class="summary-tasks-title">Tasks (' + openTasks.length + ')</div><div class="summary-task-list">' + openTasks.map(function(t){
      const whoArr = Array.isArray(t.who) ? t.who : (t.who ? [t.who] : []);
      const dcls = t.date ? deadlineClass(t.date) : '';
      return '<div class="summary-task-item"><div class="summary-task-dot"></div><span style="flex:1">' + escHtml(t.desc) + '</span>'
        + (whoArr.length ? '<span class="summary-task-who">' + escHtml(whoArr.join(', ')) + '</span>' : '')
        + (t.date ? '<span class="summary-task-date ' + dcls + '">' + formatDate(t.date) + '</span>' : '') + '</div>';
    }).join('') + '</div></div>'
    : '<div class="summary-no-tasks">Sem tasks abertas</div>';

  return '<div class="summary-card"><div class="summary-card-header"><div><div class="summary-card-name">' + escHtml(p.name) + '</div><div class="summary-card-team">' + teamAvatars + '</div></div>'
    + '<span class="summary-status" style="background:' + hexToRgba(hex, .18) + ';color:' + hex + '">' + escHtml(statusLabel) + '</span></div>'
    + logBlock + tasksBlock + '</div>';
}

function printSummary(){ setView('summary'); setTimeout(function(){ window.print(); }, 150); }

function captureCurrentViewPng(){
  if(currentView === 'board') captureAsPng('board', 'planner-projetos');
  else if(currentView === 'week') captureAsPng('taskKanbanBoard', 'planner-kanban-tasks');
  else if(currentView === 'summary') captureAsPng(summaryMode === 'people' ? 'summaryPeopleGrid' : 'summaryContent', 'planner-resumo');
}
function captureAsPng(elementId, filename){
  const el = document.getElementById(elementId);
  if(!el){ toast('Elemento não encontrado'); return; }
  if(typeof html2canvas === 'undefined'){ toast('html2canvas não carregado'); return; }
  toast('Gerando PNG…');
  const date = new Date().toISOString().slice(0, 10);
  html2canvas(el, {
    scale: 2, backgroundColor: CONFIG.theme.cores.bg, useCORS: true, logging: false,
    scrollX: 0, scrollY: -window.scrollY, windowWidth: el.scrollWidth, windowHeight: el.scrollHeight
  }).then(function(canvas){
    const link = document.createElement('a');
    link.download = filename + '-' + date + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    toast('PNG salvo!', 'success');
  }).catch(function(err){ console.error(err); toast('Erro ao gerar PNG'); });
}

// ══ EXPORT MARKDOWN ══
function exportMarkdown(){
  const now = new Date();
  const dateStr = now.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
  const lastColId = STATUS_COLS.length ? STATUS_COLS[STATUS_COLS.length - 1].id : null;
  const projects = db.projects.filter(function(p){ return p.status !== lastColId; });
  const grouped = {};
  STATUS_COLS.forEach(function(c){ grouped[c.id] = []; });
  projects.forEach(function(p){ if(grouped[p.status]) grouped[p.status].push(p); });

  let md = '# Resumo de Planning — ' + dateStr + '\n\n';
  md += '> ' + projects.length + ' projetos ativos · Gerado pelo ' + CONFIG.data.tela.nome + '\n\n---\n\n';

  STATUS_COLS.forEach(function(col){
    const items = grouped[col.id];
    if(!items || items.length === 0) return;
    md += '## ' + col.label + ' (' + items.length + ')\n\n';
    items.forEach(function(p){
      const team = (p.team || []).join(', ');
      const lastLog = p.log && p.log.length > 0 ? p.log[p.log.length - 1] : null;
      const openTasks = (p.tasks || []).filter(function(t){ return t.status !== TASK_DONE_ID; });
      const active = (p.milestones || []).find(function(m){ return m.status === 'active'; }) || (p.milestones || []).find(function(m){ return m.status !== 'done'; });
      md += '### ' + p.name + '\n';
      if(team) md += '**Time:** ' + team + '  \n';
      if(active) md += '**Marco atual:** ' + active.label + (active.date ? ' (' + formatDate(active.date) + ')' : '') + '  \n';
      if(lastLog){ md += '**Último status** (' + (lastLog.author || 'Equipe') + ' · ' + formatDate(lastLog.date) + '):  \n> ' + lastLog.text + '\n'; }
      if(openTasks.length > 0){
        md += '\n**Tasks abertas:**\n';
        openTasks.forEach(function(t){
          const whoArr = Array.isArray(t.who) ? t.who : (t.who ? [t.who] : []);
          const who = whoArr.length ? ' — *' + whoArr.join(', ') + '*' : '';
          const date = t.date ? ' · ' + formatDate(t.date) : ' · sem prazo';
          md += '- [ ] ' + t.desc + who + date + '\n';
          (t.subtasks || []).filter(function(s){ return !s.done; }).forEach(function(s){ md += '  - [ ] ' + s.text + '\n'; });
        });
      }
      md += '\n';
    });
  });

  md += '---\n*Exportado em ' + now.toLocaleString('pt-BR') + '*\n';
  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'planning-' + now.toISOString().slice(0, 10) + '.md';
  a.click(); URL.revokeObjectURL(a.href);
  toast('Exportado como .md', 'success');
}
